<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg:#f4f5f7;--card:#fff;--line:#e3e6ea;--ink:#1f2733;
    --muted:#7a828c;--brand:#2f6df0;--brand-d:#1f53c7;
    --good:#1f9d57;--warn:#d98324;--red:#c23a2b;
    --pink:#fff3f0;--pink-line:#f3d8cf;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Segoe UI","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;}

  /* 登入 */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
  .login-wrap{width:100%;max-width:380px;}
  .login-tabs{display:flex;background:var(--line);border-radius:10px;padding:3px;margin-bottom:16px;}
  .login-tabs button{flex:1;border:none;background:transparent;border-radius:7px;padding:8px 0;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;}
  .login-tabs button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .login-err{font-size:13px;min-height:20px;margin:8px 0;color:var(--warn);}
  .login-ok{font-size:13px;min-height:20px;margin:8px 0;color:var(--good);}

  /* 主程式 */
  #appScreen{padding-bottom:90px;}
  .sync-line{font-size:12px;text-align:center;margin:0 0 10px;min-height:16px;color:var(--muted);}
  .tabs{display:flex;background:var(--line);border-radius:12px;padding:3px;margin-bottom:12px;}
  .tabs button{flex:1;border:none;background:transparent;border-radius:9px;padding:9px 0;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;}
  .tabs button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .wrap{max-width:720px;margin:0 auto;padding:12px;}
  h1{font-size:20px;margin:4px 0 2px;text-align:center;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .card h2{font-size:16px;margin:0 0 10px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .card-head h2{margin:0;}

  .monthbar{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .monthbar .now{text-align:center;}
  .monthbar .now .roc{font-size:18px;font-weight:700;}
  .monthbar .now .iso{font-size:12px;color:var(--muted);}
  .navbtn{border:1px solid var(--line);background:#fff;border-radius:10px;width:46px;height:42px;font-size:20px;color:var(--ink);cursor:pointer;}
  .navbtn:active{background:#eef1f6;}

  label.fld{display:block;font-size:13px;color:var(--muted);margin:0 0 4px;}
  input[type="email"],input[type="date"],input[type="month"],input[type="number"],
  input[type="text"],input[type="password"]{
    width:100%;padding:11px 12px;font-size:16px;
    border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  input:focus{outline:none;border-color:var(--brand);}

  .itemrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);}
  .itemrow:last-child{border-bottom:none;}
  .itemrow .nm{flex:1;font-weight:600;}
  .itemrow .nm small{display:block;font-weight:400;color:var(--muted);font-size:12px;}
  .itemrow .qty{width:110px;}
  .itemrow .amt{width:84px;text-align:right;color:var(--good);font-variant-numeric:tabular-nums;}

  .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:12px;padding:12px 16px;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s;}
  .btn.primary{background:var(--brand);color:#fff;width:100%;}
  .btn.primary:active{background:var(--brand-d);}
  .btn.primary.saved{background:#b8bec7;color:#fff;}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:active{background:#eef1f6;}
  .btn.sm{padding:7px 12px;font-size:14px;border-radius:9px;}
  .row-btns{display:flex;gap:8px;flex-wrap:wrap;}

  .savedflag{font-size:13px;color:var(--good);text-align:center;min-height:18px;margin-top:8px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{color:var(--muted);font-weight:600;}
  td.day,th.day{text-align:center;width:34px;color:var(--muted);}
  #monthTable th, #monthTable td,
  #statMonthTable th, #statMonthTable td {
    text-align: center !important;
  }
  tbody tr.today td{background:#eef4ff;}
  tbody tr:active td{background:#f3f6fb;}
  tfoot td{font-weight:700;border-top:2px solid var(--line);border-bottom:none;}
  .tablescroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  .totalbox{margin-top:12px;background:var(--pink);border:1px solid var(--pink-line);border-radius:12px;padding:12px 14px;}
  .totalbox .line{display:flex;justify-content:space-between;padding:3px 0;font-size:14px;}
  .totalbox .grand{font-size:22px;font-weight:800;color:var(--red);}

  .totalbox-grid {
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    gap: 8px 12px;
    align-items: center;
    font-size: 14px;
  }
  .totalbox-grid .tb-name { font-weight: 600; text-align: left; }
  .totalbox-grid .tb-qty { text-align: right; color: var(--muted); }
  .totalbox-grid .tb-times { text-align: center; color: var(--muted); }
  .totalbox-grid .tb-price { text-align: right; color: var(--muted); }
  .totalbox-grid .tb-subtotal { text-align: right; font-weight: 600; color: var(--good); font-variant-numeric: tabular-nums; }
  .totalbox-grid .tb-total-label { grid-column: span 4; font-weight: 800; font-size: 20px; color: var(--red); text-align: left; }
  .totalbox-grid .tb-total-val { text-align: right; font-weight: 800; font-size: 20px; color: var(--red); font-variant-numeric: tabular-nums; }

  .empty{text-align:center;color:var(--muted);padding:18px 0;font-size:14px;}

  /* 品項設定（inline + 拖曳） */
  .drag-handle{color:var(--muted);font-size:20px;cursor:grab;padding:0 2px;touch-action:none;flex-shrink:0;user-select:none;}
  .drag-handle:active{cursor:grabbing;}
  .itemrow.is-dragging{opacity:0.3; background: #eef4ff;}

  .footbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:10px 12px;z-index:999;}
  .footbar .inner{max-width:720px;margin:0 auto;display:flex;gap:8px;}
  .footbar .btn{flex:1;}

  dialog{border:none;border-radius:16px;padding:0;width:min(92vw,560px);box-shadow:0 20px 60px rgba(0,0,0,.25);}
  dialog::backdrop{background:rgba(0,0,0,.4);}
  .dlg-in{padding:16px;}
  .dlg-in h2{margin-top:0;}
  .hint{font-size:12px;color:var(--muted);margin:8px 0;}
  .mt10{margin-top:10px;}
  .mt12{margin-top:12px;}
  .mt16{margin-top:16px;}
  .dlg-sep{border:none;border-top:1px solid var(--line);margin:16px 0;}

  /* 未發工資 */
  .debt-hero{text-align:center;padding:22px 14px;}
  .debt-hero .dh-label{font-size:13px;color:var(--muted);margin-bottom:4px;}
  .debt-hero .dh-amount{font-size:46px;font-weight:900;color:var(--red);line-height:1.1;}
  .debt-hero .dh-sub{font-size:12px;color:var(--muted);margin-top:6px;}
  .ldg-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .ldg{width:100%;border-collapse:collapse;font-size:13px;}
  .ldg th{color:var(--muted);font-weight:600;padding:5px 4px;border-bottom:2px solid var(--line);text-align:right;white-space:nowrap;}
  .ldg th:first-child,.ldg th:nth-child(2){text-align:left;}
  .ldg td{padding:7px 4px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;}
  .ldg td:first-child,.ldg td:nth-child(2){text-align:left;}
  .ldg .lr-opening td{background:#fffde7;font-weight:600;}
  .ldg .wage{color:var(--good);}
  .ldg .pay{color:var(--red);}
  .ldg .bal{font-weight:700;}
  .ldg .dim{color:var(--line);}
  .ldg tfoot td{font-weight:800;border-top:2px solid var(--line);border-bottom:none;font-size:14px;}
  .ldg-delbtn{background:none;border:none;color:#d0aba5;cursor:pointer;padding:2px 5px;font-size:14px;}
  .ldg-delbtn:active{color:var(--red);}

  /* 統計 */
  .stat-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center;}
  .stat-card .label{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .stat-card .value{font-size:20px;font-weight:800;color:var(--ink);line-height:1.2;}
  .stat-card .value.big{font-size:17px;}
  .stat-card .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  svg.barchart{display:block;}
  .bar-label{font-size:11px;fill:var(--muted);}
  .bar-value{font-size:10px;fill:var(--muted);}
  .bar-zero{fill:#eef1f6;}
  .item-bar-row{margin-bottom:10px;}
  .item-bar-row .ib-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;}
  .item-bar-row .ib-name{font-weight:600;}
  .item-bar-row .ib-amt{color:var(--muted);}
  .item-bar-track{background:#eef1f6;border-radius:6px;height:10px;overflow:hidden;}
  .item-bar-fill{height:100%;border-radius:6px;}

  /* 匯出按鈕 */
  .export-btn{background:none;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .export-btn:active{background:#eef1f6;}
</style>
</head>

        <label class="fld">Email</label>

        <div id="forgotMsg" style="font-size:13px;min-height:20px;margin-top:8px"></div>
        <div class="row-btns mt16">
          <button class="btn ghost" id="forgotBackBtn" style="flex:1">返回</button>
          <button class="btn primary" id="forgotSubmitBtn" style="flex:1">發送連結</button>

      </div>

        <div id="resetMsg" style="font-size:13px;min-height:20px;margin-top:8px"></div>
        <button class="btn primary mt16" id="resetSubmitBtn">確認更新密碼</button>

function loadData() {
  // 一次性清除歷史測試資料（除了品項）
  if (!localStorage.getItem("data_cleared_v2")) {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        d.records = {};
        d.opening = {date:"", amount:0};
        d.payments = [];
        // 如果此帳號是 cmm，則清除其初始標記以重新在登入時執行初始化
        delete d.initializedForCmm;
        d.updatedAt = Date.now();
        localStorage.setItem(STORE_KEY, JSON.stringify(d));
      }
    } catch(e) {}
    localStorage.setItem("data_cleared_v2", "true");
  }

  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (!Array.isArray(d.items))    d.items    = DEFAULT_ITEMS.slice();
      if (!d.records)                 d.records  = {};
      if (!d.opening)                 d.opening  = {date:"",amount:0};
      if (!Array.isArray(d.payments)) d.payments = [];
      // 自動升級舊有資料中的品項名稱
      d.items.forEach(it => {
        if (it.id === "i_hourly" && it.name === "時薪") {
          it.name = "時薪(小時)";
        }
      });
      return d;
    }
  } catch(e) {}
  return {items:DEFAULT_ITEMS.slice(),records:{},opening:{date:"",amount:0},payments:[],updatedAt:0};
}
function saveLocal() {
  if (!data.updatedAt) data.updatedAt = Date.now();
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

// ── 工具 ──────────────────────────────────────────────────────
function pad(n)     { return String(n).padStart(2,"0"); }
function ymd(d)     { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function rocYear(y) { return y - 1911; }
function money(n)   { return "$" + Math.round(n).toLocaleString("en-US"); }
function num(v)     { const n=parseFloat(v); return isNaN(n)?0:n; }
function todayStr() { return ymd(new Date()); }
function daysInMonth(y,m0) { return new Date(y,m0+1,0).getDate(); }
function ymToRoc(ym)  { const [y,m]=ym.split("-"); return `${parseInt(y)-1911}/${m}`; }
function dateToRoc(iso) {
  if (!iso) return "—"; const p=iso.split("-");
  return `${parseInt(p[0])-1911}/${p[1]}/${p[2]}`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function fmtQty(n) { return Number.isInteger(n)?String(n):n.toFixed(1); }

// ── 雲端同步 ──────────────────────────────────────────────────
function updateSyncStatus(state) {
  const el=document.getElementById("syncStatus");
  const MAP={ok:["☁ 已同步","#1f9d57"],syncing:["⟳ 同步中...","#7a828c"],error:["⚠ 同步失敗","#d98324"]};
  const [text,color]=MAP[state]||["","#c0c5cc"];
  el.textContent=text; el.style.color=color;
}
async function getCurrentUser() {
  const {data:{user}}=await supaClient.auth.getUser(); return user;
}
async function syncToCloud() {
  if (!supaClient) return;
  const user=await getCurrentUser(); if (!user) return;
  if (!data.updatedAt) data.updatedAt = Date.now();
  saveLocal(); updateSyncStatus("syncing");
  try {
    const isoTime = new Date(data.updatedAt).toISOString();
    const {error}=await supaClient.from("piecework_data")
      .upsert({key:"main",user_id:user.id,payload:data,updated_at:isoTime},{onConflict:"key,user_id"});
    if (error) throw error; updateSyncStatus("ok");
  } catch(e) { updateSyncStatus("error"); console.error("syncToCloud:",e); }
}
async function syncFromCloud() {
  if (!supaClient) return;
  const user=await getCurrentUser(); if (!user) return;
  updateSyncStatus("syncing");
  try {
    const {data:row,error}=await supaClient.from("piecework_data")
      .select("payload,updated_at").eq("key","main").eq("user_id",user.id).maybeSingle();
    if (error) throw error;
    if (!row) { await syncToCloud(); return; }
    const cloudTime=new Date(row.updated_at).getTime();
    const localTime=data.updatedAt||0;
    if (cloudTime > localTime + 1000) {
      const d=row.payload;
      if (!d.opening)  d.opening={date:"",amount:0};
      if (!Array.isArray(d.payments)) d.payments=[];
      if (!Array.isArray(d.items))    d.items=DEFAULT_ITEMS.slice();
      if (!d.records)  d.records={};
      // 自動升級雲端下載資料中的品項名稱
      d.items.forEach(it => {
        if (it.id === "i_hourly" && it.name === "時薪") {
          it.name = "時薪(小時)";
        }
      });
      d.updatedAt = cloudTime;
      data=d; saveLocal(); renderAll();
      updateSyncStatus("ok");
    } else if (localTime > cloudTime + 1000) {
      await syncToCloud();
    } else {
      updateSyncStatus("ok");
    }
  } catch(e) { updateSyncStatus("error"); console.error("syncFromCloud:",e); }
}

function setSaveBtnState(state) {
  const btn=document.getElementById("saveBtn");
  const dateInput=document.getElementById("dateInput");
  const qtyInputs=document.querySelectorAll("#entryItems input.qty");
  if (state==="saved") {
    btn.textContent="更改";
    btn.classList.add("saved");
    if (dateInput) dateInput.disabled = true;
    qtyInputs.forEach(inp => inp.disabled = true);
  }
  else {
    btn.textContent="儲存這天";
    btn.classList.remove("saved");
    if (dateInput) dateInput.disabled = false;
    qtyInputs.forEach(inp => inp.disabled = false);
  }
}

function renderEntryForm() {
  const box=document.getElementById("entryItems");
  const date=document.getElementById("dateInput").value;
  const rec=(date&&data.records[date])||{};
  box.innerHTML="";
  data.items.forEach(it=>{
    const qty=rec[it.id]!=null?rec[it.id]:"";
    const row=document.createElement("div"); row.className="itemrow";
    row.dataset.id = it.id;
    row.innerHTML=`
      <span class="drag-handle" style="margin-right:8px;font-size:20px;color:var(--muted);cursor:grab;user-select:none;touch-action:none">⠿</span>
      <div class="nm-edit-btn" style="flex:1;display:flex;align-items:center;gap:4px;cursor:pointer" data-id="${it.id}">
        <span class="nm" style="font-weight:600">${escapeHtml(it.name)}</span>
        <small style="color:var(--muted);font-size:12px">${money(it.price)}/${escapeHtml(it.unit)}</small>
        <span style="font-size:11px;color:var(--brand)">✏️</span>
      </div>
      <input class="qty" type="number" inputmode="decimal" step="any" min="0"
             data-item="${it.id}" placeholder="0" value="${qty}" style="width:90px;margin-left:8px">
      <div class="amt" data-amt="${it.id}" style="width:80px;text-align:right;color:var(--good);font-variant-numeric:tabular-nums;font-weight:600">${money(num(qty)*it.price)}</div>`;
    box.appendChild(row);
  });
  box.querySelectorAll(".nm-edit-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const it=data.items.find(x=>x.id===btn.dataset.id);
      if(!it) return;
      document.getElementById("itemEditTitle").textContent="編輯品項";
      document.getElementById("editItemId").value=it.id;
      document.getElementById("editItemName").value=it.name;
      document.getElementById("editItemUnit").value=it.unit;
      document.getElementById("editItemPrice").value=it.price;
      document.getElementById("deleteItemBtn").style.display="";
      document.getElementById("itemEditDlg").showModal();
    });

  box.querySelectorAll("input.qty").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const it=data.items.find(x=>x.id===inp.dataset.item);
      box.querySelector(`[data-amt="${inp.dataset.item}"]`).textContent=money(num(inp.value)*it.price);
      setSaveBtnState("unsaved");
    });
  });
  // 根據是否已有紀錄決定按鈕初始狀態
  const hasRec=date&&data.records[date]&&Object.keys(data.records[date]).length>0;
  setSaveBtnState(hasRec?"saved":"unsaved");
  enableDragSort();
}
function saveEntry() {
  const date=document.getElementById("dateInput").value;
  if (!date){flash("請先選日期",true);return;}
  const rec={};
  document.querySelectorAll("#entryItems input.qty").forEach(inp=>{
    const v=num(inp.value); if (v) rec[inp.dataset.item]=v;
  });
  if (!Object.keys(rec).length){delete data.records[date];}
  else{data.records[date]=rec;}
  saveLocal();syncToCloud();
  flash("已儲存 "+date);
  setSaveBtnState("saved");
  renderMonthTable();
}

function renderMonthTable() {
  const y=viewDate.getFullYear(),m0=viewDate.getMonth(),dim=daysInMonth(y,m0),items=data.items;
  const table=document.getElementById("monthTable");
  let html="<thead><tr><th class='day'>日</th>";
  items.forEach(it=>html+=`<th>${escapeHtml(it.name)}</th>`);
  html+="<th>金額</th></tr></thead><tbody>";
  const colTotal={}; items.forEach(it=>colTotal[it.id]=0);
  let grand=0,hasAny=false;
  for (let d=1;d<=dim;d++) {
    const key=`${y}-${pad(m0+1)}-${pad(d)}`,rec=data.records[key]; if (!rec) continue;
    hasAny=true; let dayMoney=0,cells="";
    items.forEach(it=>{
      const q=rec[it.id]||0;colTotal[it.id]+=q;dayMoney+=q*it.price;
      cells+=`<td>${q?fmtQty(q):""}</td>`;
    });
    grand+=dayMoney;
    html+=`<tr${key===todayStr()?" class='today'":""} data-key="${key}"><td class='day'>${d}</td>${cells}<td>${money(dayMoney)}</td></tr>`;
  }
  html+="</tbody>";
  if (hasAny){
    html+="<tfoot><tr><td class='day'>合計</td>";
    items.forEach(it=>html+=`<td>${colTotal[it.id]?fmtQty(colTotal[it.id]):""}</td>`);
    html+=`<td>${money(grand)}</td></tr></tfoot>`;
  }
  table.innerHTML=html;
  if (!hasAny) table.innerHTML="<tbody><tr><td colspan='100'><div class='empty'>這個月還沒有紀錄</div></td></tr></tbody>";
  table.querySelectorAll("tbody tr[data-key]").forEach(tr=>{
    tr.addEventListener("click",()=>{
      document.getElementById("dateInput").value=tr.dataset.key;
      renderEntryForm();window.scrollTo({top:0,behavior:"smooth"});
    });
  });
  renderMonthTotals(colTotal,grand);
}
function renderMonthTotals(colTotal,grand) {
  const box=document.getElementById("monthTotals");
  let html='<div class="totalbox-grid">';
  data.items.forEach(it=>{
    const q=colTotal[it.id]||0; if (!q) return;
    html+=`
      <div class="tb-name">${escapeHtml(it.name)}</div>
      <div class="tb-qty">${fmtQty(q)} ${escapeHtml(it.unit)}</div>
      <div class="tb-times">×</div>
      <div class="tb-price">${money(it.price)}</div>
      <div class="tb-subtotal">${money(q*it.price)}</div>
    `;
  });
  html+=`
    <div class="tb-total-label" style="margin-top: 8px;">本月合計</div>
    <div class="tb-total-val" style="margin-top: 8px;">${money(grand)}</div>
  </div>`;
  box.innerHTML=html;
}

// ── 登記紀錄拖曳排序 ───────────────────────────
function enableDragSort() {
  const list=document.getElementById("entryItems");
  let dragEl=null, ghostEl=null, offsetY=0;

  function getRows(){return [...list.querySelectorAll(".itemrow")];}
  function nearestRow(y){
    for (const r of getRows()){
      if (r===dragEl) continue;
      const rect=r.getBoundingClientRect();
      if (y<rect.bottom) return {el:r,before:y<rect.top+rect.height/2};
    }
    return null;
  }

  list.addEventListener("pointerdown",e=>{
    if (!e.target.closest(".drag-handle")) return;
    e.preventDefault();
    dragEl=e.target.closest(".itemrow");
    const rect=dragEl.getBoundingClientRect();
    offsetY=e.clientY-rect.top;
    ghostEl=dragEl.cloneNode(true);
    ghostEl.querySelector("input").value = dragEl.querySelector("input").value;
    Object.assign(ghostEl.style,{
      position:"fixed",left:rect.left+"px",width:rect.width+"px",
      top:rect.top+"px",zIndex:9999,opacity:"0.85",pointerEvents:"none",
      background:"#fff",borderRadius:"10px",boxShadow:"0 4px 20px rgba(0,0,0,.2)",
      border:"1px solid #e3e6ea",margin:0,display:"flex",alignItems:"center"
    });
    document.body.appendChild(ghostEl);
    dragEl.classList.add("is-dragging");
    list.setPointerCapture(e.pointerId);
  },{passive:false});

  list.addEventListener("pointermove",e=>{
    if (!dragEl) return;
    ghostEl.style.top=(e.clientY-offsetY)+"px";
    const pos=nearestRow(e.clientY);
    if (pos){
      if (pos.before) list.insertBefore(dragEl,pos.el);
      else            list.insertBefore(dragEl,pos.el.nextSibling);
    }
  });

  function endDrag(){
    if (!dragEl) return;
    dragEl.classList.remove("is-dragging");
    ghostEl?.remove(); ghostEl=null; dragEl=null;
    
    const rows = list.querySelectorAll(".itemrow");
    const newItems = [];
    rows.forEach(row => {
      const id = row.dataset.id;
      const it = data.items.find(x => x.id === id);
      if (it) newItems.push(it);
    });
    data.items = newItems;
    data.updatedAt = Date.now();
    saveLocal();
    syncToCloud();
    renderMonthTable();
  }
  list.addEventListener("pointerup",endDrag);
  list.addEventListener("pointercancel",endDrag);
}

// ── 未發工資分頁 ───────────────────────────────────────────────
function buildLedgerRows() {
  const op=data.opening,openingYM=(op&&op.date)?op.date.slice(0,7):"";
  const wagesByYM={};
  Object.keys(data.records).forEach(key=>{
    const ym=key.slice(0,7);
    if (openingYM&&ym<=openingYM) return;
    if (!wagesByYM[ym]) wagesByYM[ym]=0;
    const rec=data.records[key];
    data.items.forEach(it=>{wagesByYM[ym]+=(rec[it.id]||0)*it.price;});
  });
  const paysByYM={};
  (data.payments||[]).forEach(p=>{
    if (!paysByYM[p.yearMonth]) paysByYM[p.yearMonth]=[];
    paysByYM[p.yearMonth].push(p);
  });
  const allYMs=[...new Set([...Object.keys(wagesByYM),...Object.keys(paysByYM)])].sort();
  let balance=(op&&op.amount)?op.amount:0;
  const rows=[];
  if (op&&(op.date||op.amount)){
    rows.push({type:"opening",date:op.date?dateToRoc(op.date):"—",desc:"期初金額",wages:null,payment:null,balance});
  }
  allYMs.forEach(ym=>{
    const roc=ymToRoc(ym);
    (paysByYM[ym]||[]).forEach(p=>{
      balance-=p.amount;
      rows.push({type:"payment",date:roc,desc:p.note||`${roc} 付款`,wages:null,payment:p.amount,balance,paymentId:p.id});
    });
    const wages=wagesByYM[ym]||0;
    if (wages>0){balance+=wages;rows.push({type:"wages",date:roc,desc:`${roc} 工資`,wages,payment:null,balance});}
  });
  return {rows,balance};
}
function renderDebt() {
  const {rows,balance}=buildLedgerRows();
  document.getElementById("debtAmount").textContent=money(balance);
  const op=data.opening;
  document.getElementById("debtSub").textContent=
    (op&&op.date)?`含截至 ${dateToRoc(op.date)} 的期初金額`:rows.length?"":"尚未設定期初金額";
  const box=document.getElementById("ledgerContent");
  if (!rows.length){
    box.innerHTML=`<div class="empty">尚無任何紀錄<br><small>請先「設定期初金額」，或到記錄頁登記工資</small></div>`;
    return;
  }
  let html=`<table class="ldg">
    <thead><tr><th>日期</th><th>說明</th><th>工資</th><th>付款</th><th>結餘</th><th></th></tr></thead><tbody>`;
  rows.forEach(row=>{
    const wCell=row.wages!=null?`<td class="wage">+${money(row.wages)}</td>`:`<td class="dim">—</td>`;
    const pCell=row.payment!=null?`<td class="pay">-${money(row.payment)}</td>`:`<td class="dim">—</td>`;
    const del=row.type==="payment"?`<button class="ldg-delbtn" data-pid="${row.paymentId}">✕</button>`:``;
    html+=`<tr class="lr-${row.type}"><td>${escapeHtml(row.date)}</td><td>${escapeHtml(row.desc)}</td>${wCell}${pCell}<td class="bal">${money(row.balance)}</td><td>${del}</td></tr>`;
  });
  html+=`</tbody><tfoot><tr><td colspan="4" style="text-align:left">目前結餘</td><td class="pay" style="font-size:15px">${money(rows[rows.length-1].balance)}</td><td></td></tr></tfoot></table>`;
  box.innerHTML=html;
  box.querySelectorAll(".ldg-delbtn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if (!confirm("確定刪除這筆付款紀錄？")) return;
      data.payments=data.payments.filter(p=>p.id!==btn.dataset.pid);
      saveLocal();syncToCloud();renderDebt();
    });
  });
}

// ── 統計分頁 ──────────────────────────────────────────────────
function calcMonthStats(dateObj) {
  const y=dateObj.getFullYear(), m0=dateObj.getMonth(), dim=daysInMonth(y,m0);
  const dayTotals=Array(dim).fill(0), itemTotals={};
  data.items.forEach(it=>itemTotals[it.id]=0);
  let grand=0, days=0;
  for (let d=1; d<=dim; d++) {
    const key=`${y}-${pad(m0+1)}-${pad(d)}`, rec=data.records[key];
    if (!rec) continue;
    let dayMoney=0;
    data.items.forEach(it=>{
      const q=rec[it.id]||0;
      itemTotals[it.id]+=q*it.price;
      dayMoney+=q*it.price;
    });
    if (dayMoney>0) {
      days++;
      grand+=dayMoney;
      dayTotals[d-1]=dayMoney;
    }
  }
  return {dayTotals, itemTotals, grand, days};
}
function renderStats() {
  const y=statMonthDate.getFullYear(), m=statMonthDate.getMonth()+1;
  document.getElementById("statYearRoc").textContent=`${rocYear(y)}年 ${m}月`;
  document.getElementById("statYearIso").textContent=`西元 ${y} 年 ${m} 月`;
  const {dayTotals,itemTotals,grand,days}=calcMonthStats(statMonthDate);
  document.getElementById("statTotal").textContent=money(grand);
  document.getElementById("statDays").textContent=days;
  document.getElementById("statAvg").textContent=money(days?Math.round(grand/days):0);
  renderBarChart(dayTotals,statMonthDate);
  renderItemBreakdown(itemTotals,grand);
  renderStatMonthTable();
}
function renderBarChart(dayTotals, dateObj) {
  const W=32, GAP=5, PL=8, PR=8, PT=15, PB=30, BH=140;
  const maxVal=Math.max(...dayTotals, 1);
  const today=new Date();
  const isCurrentMonth = (dateObj.getFullYear()===today.getFullYear() && dateObj.getMonth()===today.getMonth());
  const curD = isCurrentMonth ? today.getDate() : -1;
  
  const TW=PL+dayTotals.length*(W+GAP)-GAP+PR, TH=PT+BH+PB;
  let svg=`<svg class="barchart" width="${TW}" height="${TH}" xmlns="http://www.w3.org/2000/svg">`;
  dayTotals.forEach((val,i)=>{
    const dayNum = i+1;
    const x=PL+i*(W+GAP), bH=val?Math.max(Math.round((val/maxVal)*BH),4):0, bY=PT+BH-bH;
    const color=(dayNum===curD)?"#2f6df0":"#93b4f8";
    svg+=`<rect x="${x}" y="${PT}" width="${W}" height="${BH}" rx="4" class="bar-zero"/>`;
    if (val){
      svg+=`<rect x="${x}" y="${bY}" width="${W}" height="${bH}" rx="4" fill="${color}"/>`;
      const s=val>=1000?(val/1000).toFixed(1)+"k":Math.round(val);
      svg+=`<text x="${x+W/2}" y="${bY-3}" text-anchor="middle" class="bar-value" style="font-size:9px">${s}</text>`;
    }
    svg+=`<text x="${x+W/2}" y="${PT+BH+14}" text-anchor="middle" class="bar-label">${dayNum}</text>`;
  });
  svg+=`</svg>`;
  document.getElementById("barChartWrap").innerHTML=svg;
}
function renderItemBreakdown(itemTotals,grand) {
  const box=document.getElementById("itemBreakdown");
  if (!grand){box.innerHTML=`<div class="empty">這個月還沒有紀錄</div>`;return;}
  let html="";
  data.items.forEach((it,i)=>{
    const amt=itemTotals[it.id]||0;if (!amt) return;
    const pct=Math.round(amt/grand*100),color=ITEM_COLORS[i%ITEM_COLORS.length];
    html+=`<div class="item-bar-row">
      <div class="ib-head"><span class="ib-name" style="color:${color}">${escapeHtml(it.name)}</span><span class="ib-amt">${money(amt)}　${pct}%</span></div>
      <div class="item-bar-track"><div class="item-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  });
  box.innerHTML=html;
}
function renderStatMonthTable() {
  const y=statMonthDate.getFullYear(),m0=statMonthDate.getMonth();
  document.getElementById("statMonthLabel").textContent=`${rocYear(y)}年 ${m0+1}月 明細`;
  const dim=daysInMonth(y,m0),items=data.items;
  const table=document.getElementById("statMonthTable");
  let html="<thead><tr><th class='day'>日</th>";
  items.forEach(it=>html+=`<th>${escapeHtml(it.name)}</th>`);
  html+="<th>金額</th></tr></thead><tbody>";
  const colTotal={}; items.forEach(it=>colTotal[it.id]=0);
  let grand=0,hasAny=false;
  for (let d=1;d<=dim;d++) {
    const key=`${y}-${pad(m0+1)}-${pad(d)}`,rec=data.records[key];if (!rec) continue;
    hasAny=true;let dayMoney=0,cells="";
    items.forEach(it=>{
      const q=rec[it.id]||0;colTotal[it.id]+=q;dayMoney+=q*it.price;
      cells+=`<td>${q?fmtQty(q):""}</td>`;
    });
    grand+=dayMoney;
    html+=`<tr${key===todayStr()?" class='today'":""}><td class='day'>${d}</td>${cells}<td>${money(dayMoney)}</td></tr>`;
  }
  html+="</tbody>";
  if (hasAny){
    html+="<tfoot><tr><td class='day'>合計</td>";
    items.forEach(it=>html+=`<td>${colTotal[it.id]?fmtQty(colTotal[it.id]):""}</td>`);
    html+=`<td>${money(grand)}</td></tr></tfoot>`;
  }
  table.innerHTML=html;
  if (!hasAny) table.innerHTML="<tbody><tr><td colspan='100'><div class='empty'>這個月還沒有紀錄</div></td></tr></tbody>";
  const totBox=document.getElementById("statMonthTotals");
  if (!grand){totBox.innerHTML="";return;}
  let th='<div class="totalbox-grid">';
  data.items.forEach(it=>{
    const q=colTotal[it.id]||0;if (!q) return;
    th+=`
      <div class="tb-name">${escapeHtml(it.name)}</div>
      <div class="tb-qty">${fmtQty(q)} ${escapeHtml(it.unit)}</div>
      <div class="tb-times">×</div>
      <div class="tb-price">${money(it.price)}</div>
      <div class="tb-subtotal">${money(q*it.price)}</div>
    `;
  });
  th+=`
    <div class="tb-total-label" style="margin-top: 8px;">本月合計</div>
    <div class="tb-total-val" style="margin-top: 8px;">${money(grand)}</div>
  </div>`;
  totBox.innerHTML=`<div class="totalbox" style="margin-top:8px">${th}</div>`;
}

// ── 匯出圖片 ─────────────────────────────────────────────────
async function exportAsImage(elementId, filename) {
  const el = document.getElementById(elementId);
  try {
    const canvas = await html2canvas(el, {
      scale: 2, backgroundColor: "#f4f5f7",
      useCORS: true, allowTaint: true
    });
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = filename + ".png";
    a.click();
  } catch(e) { alert("匯出失敗：" + e.message); }
}
